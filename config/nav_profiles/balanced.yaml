profile:
  name: balanced
  description: Balanced indoor/outdoor navigation tuned for stable missions.

localization_server:
  ros__parameters:
    lidar_icp_weight: 0.8

planner_server:
  ros__parameters:
    obstacle_stop_distance_m: 0.35
    obstacle_wait_before_replan_s: 5.0
    obstacle_replan_reverse_s: 0.8
    nav_replan_seconds: 1.5
    path_smoothing_resolution: 0.05
    max_path_curvature: 2.0

controller_server:
  ros__parameters:
    max_linear_mps: 0.40
    nav_max_acceleration: 0.30
    nav_max_angular_accel: 2.0
    trajectory_lookahead_m: 0.50
    lookahead_min_m: 0.15
    lookahead_max_m: 0.80
    lookahead_gain: 0.80
    kp_angular: 2.5
    ki_angular: 0.1
    kd_angular: 0.3
    kp_linear: 1.0

map_server:
  ros__parameters:
    obstacle_detection_cone_deg: 25.0
    web_map_overlay_interval_s: 0.15
    map_image_push_interval_s: 0.75
    web_map_scan_points: 120
