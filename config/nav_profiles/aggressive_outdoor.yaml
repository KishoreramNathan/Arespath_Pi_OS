profile:
  name: aggressive_outdoor
  description: >
    High-speed outdoor profile for open areas.  Reduced obstacle wait,
    wider detection cone, fast replanning.  Not recommended indoors.

# ── Nav2-style per-server parameter blocks ───────────────────────────────────
# Keys must match the TUNABLES dict in runtime_cfg.py.
# Unknown keys are silently ignored so profiles stay forward-compatible.

localization_server:
  ros__parameters:
    lidar_icp_weight: 0.65         # trust odometry more at speed

planner_server:
  ros__parameters:
    obstacle_stop_distance_m: 0.28
    obstacle_wait_before_replan_s: 3.0
    obstacle_replan_reverse_s: 1.0
    nav_replan_seconds: 0.8
    path_smoothing_resolution: 0.07
    max_path_curvature: 3.0

controller_server:
  ros__parameters:
    max_linear_mps: 0.70
    nav_max_acceleration: 0.55
    nav_max_angular_accel: 3.0
    trajectory_lookahead_m: 0.80
    lookahead_min_m: 0.22
    lookahead_max_m: 1.20
    lookahead_gain: 1.05
    kp_angular: 1.9
    ki_angular: 0.06
    kd_angular: 0.20
    kp_linear: 0.90

map_server:
  ros__parameters:
    obstacle_detection_cone_deg: 20.0
    web_map_overlay_interval_s: 0.25   # lighter UI at speed
    map_image_push_interval_s: 1.50
    web_map_scan_points: 60            # fewer scan dots → faster canvas
