profile:
  name: smooth_indoor
  description: Conservative indoor profile with smoother turns and gentler acceleration.

localization_server:
  ros__parameters:
    lidar_icp_weight: 0.88

planner_server:
  ros__parameters:
    obstacle_stop_distance_m: 0.40
    obstacle_wait_before_replan_s: 5.0
    obstacle_replan_reverse_s: 0.6
    nav_replan_seconds: 1.0
    path_smoothing_resolution: 0.04
    max_path_curvature: 1.6

controller_server:
  ros__parameters:
    max_linear_mps: 0.28
    nav_max_acceleration: 0.18
    nav_max_angular_accel: 1.5
    trajectory_lookahead_m: 0.42
    lookahead_min_m: 0.12
    lookahead_max_m: 0.65
    lookahead_gain: 0.72
    kp_angular: 2.9
    ki_angular: 0.12
    kd_angular: 0.34
    kp_linear: 1.1

map_server:
  ros__parameters:
    obstacle_detection_cone_deg: 30.0
    web_map_overlay_interval_s: 0.12
    map_image_push_interval_s: 0.65
    web_map_scan_points: 100
